
##### Basics
set -g mouse on

# Prefix: Ctrl-a
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# History
set -g history-limit 50000

# 256color + truecolor (requires tmux-256color terminfo available)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Status line colors
set -g status-bg colour235
set -g status-fg colour136

# Window styles (modern syntax)
setw -g window-status-style fg=colour136,bg=colour235
setw -g window-status-current-style fg=colour235,bg=colour136

# Status line content
set -g status-left '#[fg=colour136]#H#[default] '
set -g status-right '#[fg=colour136]#(date +"%H:%M:%S")#[default]'
set -g status-left-length 50
set -g status-right-length 50

# Window/pane behavior
set -g renumber-windows on
set -g aggressive-resize on

# Keybindings: splits and reload
bind \| split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Vi-style copy-mode
setw -g mode-keys vi

##### Clipboard integration
# Use `y` in copy-mode to send selection to system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
  'sh -c "command -v wl-copy >/dev/null && wl-copy || xclip -selection clipboard -i"'

# Also let tmux advertise OSC52 clipboard support when possible
set -g set-clipboard on

##### Plugins (TPM)
# Install TPM if not already: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'

# Choose ONE look-and-feel plugin
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/default/orange'   # example theme selection

# Alternative: tmux powerline (comment themepack above if you prefer this)
#set -g @plugin 'erikw/tmux-powerline'

# Install tmux-prefix like whichkey
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'
set -g @prefix_highlight_output_prefix '< '
set -g @prefix_highlight_output_suffix ' >'

# Initialize TPM (must be last)
run -b '~/.tmux/plugins/tpm/tpm'
