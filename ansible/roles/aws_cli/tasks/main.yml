---
- name: Detect installed aws cli (if any)
  ansible.builtin.command: aws --version
  register: _awscli_version
  failed_when: false
  changed_when: false

- name: Download AWS CLI v2 installer (arm64)
  ansible.builtin.unarchive:
    src: https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip
    dest: /tmp
    remote_src: yes
  when: _awscli_version.rc != 0

- name: Install AWS CLI v2
  ansible.builtin.command: /tmp/aws/install --update
  when: _awscli_version.rc != 0
  changed_when: true

# git-remote-codecommit is the supported way to clone codecommit:// URLs without
# storing IAM HTTPS credentials. Installed system-wide via uv tool so the helper
# is on every user's PATH (git looks up `git-remote-<protocol>` on PATH).
- name: Install git-remote-codecommit system-wide via uv tool
  ansible.builtin.command: /usr/local/bin/uv tool install git-remote-codecommit
  environment:
    UV_TOOL_DIR: /opt/uv-tools
    UV_TOOL_BIN_DIR: /usr/local/bin
  args:
    creates: /usr/local/bin/git-remote-codecommit

# The ccx EC2 uses its IAM instance role for all AWS auth; named profiles
# only get in the way (e.g. git-remote-codecommit raises ProfileNotFound when
# AWS_PROFILE is set to a profile that isn't in ~/.aws/config). Make sure no
# stray ~/.aws/config sits around — earlier provisioning experimented with
# adding one. The instance role is picked up via the default credential
# chain (IMDS) without any config file.
- name: Ensure no ~/.aws/config exists (rely on EC2 instance role only)
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.file:
    path: "{{ target_home }}/.aws/config"
    state: absent

# CodeArtifact tokens expire after 12h. Refreshing on every shell startup
# (cached for 11h) keeps `uv sync` working in any sesio repo that uses the
# private index, with no per-user setup. The instance role grants access; no
# AWS_PROFILE needed. Both index names are exported because projects vary
# (sesio__network uses "sesio-codeartifact", others use "sesio").
- name: Drop /etc/profile.d/sesio-codeartifact.sh
  ansible.builtin.copy:
    dest: /etc/profile.d/sesio-codeartifact.sh
    mode: "0644"
    owner: root
    group: root
    content: |
      # Managed by ccx ansible (roles/aws_cli). Refreshes a CodeArtifact token
      # via the EC2 instance role and exports it as uv index credentials. The
      # cache lives under each user's ~/.cache so concurrent shells don't race.
      _sesio_ca_cache="${HOME}/.cache/sesio-codeartifact-token"

      _sesio_ca_refresh() {
        command -v aws >/dev/null 2>&1 || return 1
        mkdir -p "${HOME}/.cache" 2>/dev/null || return 1
        if [ ! -s "$_sesio_ca_cache" ] || [ -n "$(find "$_sesio_ca_cache" -mmin +660 2>/dev/null)" ]; then
          aws codeartifact get-authorization-token \
            --domain sesio --domain-owner 709389331805 --region eu-west-1 \
            --query authorizationToken --output text >"${_sesio_ca_cache}.tmp" 2>/dev/null || {
              rm -f "${_sesio_ca_cache}.tmp"
              return 1
            }
          chmod 600 "${_sesio_ca_cache}.tmp"
          mv "${_sesio_ca_cache}.tmp" "$_sesio_ca_cache"
        fi
      }

      if _sesio_ca_refresh; then
        UV_INDEX_SESIO_CODEARTIFACT_USERNAME=aws
        UV_INDEX_SESIO_CODEARTIFACT_PASSWORD="$(cat "$_sesio_ca_cache")"
        UV_INDEX_SESIO_USERNAME=aws
        UV_INDEX_SESIO_PASSWORD="$UV_INDEX_SESIO_CODEARTIFACT_PASSWORD"
        export UV_INDEX_SESIO_CODEARTIFACT_USERNAME UV_INDEX_SESIO_CODEARTIFACT_PASSWORD
        export UV_INDEX_SESIO_USERNAME UV_INDEX_SESIO_PASSWORD
      fi

      unset -f _sesio_ca_refresh
      unset _sesio_ca_cache
