---
- name: Detect installed aws cli (if any)
  ansible.builtin.command: aws --version
  register: _awscli_version
  failed_when: false
  changed_when: false

- name: Download AWS CLI v2 installer (arm64)
  ansible.builtin.unarchive:
    src: https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip
    dest: /tmp
    remote_src: yes
  when: _awscli_version.rc != 0

- name: Install AWS CLI v2
  ansible.builtin.command: /tmp/aws/install --update
  when: _awscli_version.rc != 0
  changed_when: true

# git-remote-codecommit is the supported way to clone codecommit:// URLs without
# storing IAM HTTPS credentials. Installed system-wide via uv tool so the helper
# is on every user's PATH (git looks up `git-remote-<protocol>` on PATH).
- name: Install git-remote-codecommit system-wide via uv tool
  ansible.builtin.command: /usr/local/bin/uv tool install git-remote-codecommit
  environment:
    UV_TOOL_DIR: /opt/uv-tools
    UV_TOOL_BIN_DIR: /usr/local/bin
  args:
    creates: /usr/local/bin/git-remote-codecommit

# git-remote-codecommit (and any tool that keys off `.awsprofile=sesio__euwest1`)
# require a *named* profile in ~/.aws/config — the codecommit:// URL format
# embeds a profile name, so botocore raises ProfileNotFound if it's missing,
# even when the EC2 instance role would otherwise grant access.
# `credential_source = Ec2InstanceMetadata` makes the named profile resolve
# credentials via IMDS instead of static keys.
- name: Ensure ~/.aws exists
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.file:
    path: "{{ target_home }}/.aws"
    state: directory
    mode: "0700"

- name: Configure sesio__euwest1 AWS profile (uses EC2 instance role via IMDS)
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/.aws/config"
    create: yes
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED - sesio__euwest1 profile"
    block: |
      [profile sesio__euwest1]
      region = {{ aws_region }}
      credential_source = Ec2InstanceMetadata
