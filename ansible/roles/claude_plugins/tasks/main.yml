---
# --- plugins ---------------------------------------------------------------
# `claude plugin install` is idempotent when the plugin is already installed
# (returns 0 with a "already installed" notice), but we check via the cache
# directory to skip the network round-trip when nothing needs doing.
- name: Check which Claude plugins are already installed
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.stat:
    path: "{{ target_home }}/.claude/plugins/cache/claude-plugins-official/{{ item }}"
  loop: "{{ claude_plugins }}"
  register: _plugin_stat

- name: Install missing Claude plugins
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command:
    cmd: "claude plugin install {{ item.item }}@claude-plugins-official"
  loop: "{{ _plugin_stat.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists
  changed_when: true

# --- stdio MCP servers -----------------------------------------------------
# `claude mcp get NAME` returns rc=0 iff the server is already registered —
# a per-name check is more robust than substring-matching against the full
# `mcp list` output (names like `git` can collide with unrelated text).
- name: Probe each stdio MCP for existence
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command: "claude mcp get {{ item.name }}"
  loop: "{{ mcp_stdio_servers }}"
  loop_control:
    label: "{{ item.name }}"
  register: _mcp_probe
  changed_when: false
  failed_when: false

- name: Install missing stdio MCP servers
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command:
    # Passing the JSON via argv keeps quoting correct; ansible's command
    # module splits argv without a shell so embedded quotes survive.
    argv:
      - claude
      - mcp
      - add-json
      - "{{ item.item.name }}"
      - "{{ item.item.config | to_json }}"
  loop: "{{ _mcp_probe.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.rc != 0

# n8n — same flow, but gated on an ansible var so we don't bake the API key
# into the playbook. Pass `-e n8n_api_key=<token>` when you want it on.
- name: Probe for n8n MCP
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command: claude mcp get n8n
  register: _n8n_probe
  changed_when: false
  failed_when: false
  when: n8n_api_key | length > 0

- name: Install the n8n MCP server (only when n8n_api_key is provided)
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command:
    argv:
      - claude
      - mcp
      - add-json
      - n8n
      - "{{ {'command': 'npx', 'args': ['-y', '@leonardsellem/n8n-mcp-server'], 'env': {'N8N_API_URL': 'https://n8n.sesio.io/api/v1', 'N8N_API_KEY': n8n_api_key}} | to_json }}"
  when:
    - n8n_api_key | length > 0
    - _n8n_probe.rc | default(0) != 0

# --- http MCP servers ------------------------------------------------------
- name: Probe each http MCP for existence
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command: "claude mcp get {{ item.name }}"
  loop: "{{ mcp_http_servers }}"
  loop_control:
    label: "{{ item.name }}"
  register: _mcp_http_probe
  changed_when: false
  failed_when: false

- name: Install missing http MCP servers
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command:
    argv:
      - claude
      - mcp
      - add
      - --transport
      - http
      - "{{ item.item.name }}"
      - "{{ item.item.url }}"
  loop: "{{ _mcp_http_probe.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.rc != 0
