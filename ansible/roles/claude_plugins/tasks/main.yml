---
# --- plugins ---------------------------------------------------------------
# Read the manifest to decide what to install. The cache dir alone isn't
# authoritative (it can be populated by a failed/aborted install without
# the manifest being updated — which is exactly what we just hit).
- name: Read current installed-plugins manifest
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.slurp:
    src: "{{ target_home }}/.claude/plugins/installed_plugins.json"
  register: _plugins_manifest
  failed_when: false

- name: Compute the set of already-installed plugins
  ansible.builtin.set_fact:
    _installed_plugin_names: >-
      {{
        (((_plugins_manifest.content | default('') | b64decode | from_json).plugins) | default({})).keys()
        | map('regex_replace', '@.*$', '') | list
      }}

- name: Install missing Claude plugins
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command:
    cmd: "claude plugin install {{ item }}@claude-plugins-official"
  loop: "{{ claude_plugins }}"
  when: item not in _installed_plugin_names
  changed_when: true

# --- cleanup: remove any project-scope copies we (or a prior run of this
# role) accidentally installed. `-s user` below is the correct scope for
# host-wide availability; anything sitting in the project scope for
# ~/sesio__ccx would otherwise shadow the user-scope entry.
- name: Strip project-scope MCP leftovers from ~/.claude.json
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json, pathlib, sys
        p = pathlib.Path.home() / ".claude.json"
        if not p.exists():
            sys.exit(0)
        d = json.loads(p.read_text())
        changed = False
        for proj_path, proj in (d.get("projects") or {}).items():
            mcps = proj.get("mcpServers") or {}
            # Keep only servers we don't manage (none currently), drop the rest.
            if mcps:
                proj["mcpServers"] = {}
                changed = True
        if changed:
            p.write_text(json.dumps(d, indent=2))
            print("stripped project-scope mcp entries")
  register: _strip
  changed_when: "'stripped' in _strip.stdout"

# --- stdio MCP servers at USER scope ---------------------------------------
# `claude mcp get NAME` searches all scopes; rc=1 with "No MCP server found"
# when truly missing. After the strip above, rc=1 means we need to install.
- name: Probe each stdio MCP for existence
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command: "claude mcp get {{ item.name }}"
  loop: "{{ mcp_stdio_servers }}"
  loop_control:
    label: "{{ item.name }}"
  register: _mcp_probe
  changed_when: false
  failed_when: false

- name: Install missing stdio MCP servers (user scope)
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command:
    argv:
      - claude
      - mcp
      - add-json
      - -s
      - user
      - "{{ item.item.name }}"
      - "{{ item.item.config | to_json }}"
  loop: "{{ _mcp_probe.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.rc != 0

# n8n — same flow, gated on n8n_api_key ansible var.
- name: Probe for n8n MCP
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command: claude mcp get n8n
  register: _n8n_probe
  changed_when: false
  failed_when: false
  when: n8n_api_key | length > 0

- name: Install the n8n MCP server (only when n8n_api_key is provided)
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command:
    argv:
      - claude
      - mcp
      - add-json
      - -s
      - user
      - n8n
      - "{{ {'command': 'npx', 'args': ['-y', '@leonardsellem/n8n-mcp-server'], 'env': {'N8N_API_URL': 'https://n8n.sesio.io/api/v1', 'N8N_API_KEY': n8n_api_key}} | to_json }}"
  when:
    - n8n_api_key | length > 0
    - _n8n_probe.rc | default(0) != 0

# --- http MCP servers at USER scope ---------------------------------------
- name: Probe each http MCP for existence
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command: "claude mcp get {{ item.name }}"
  loop: "{{ mcp_http_servers }}"
  loop_control:
    label: "{{ item.name }}"
  register: _mcp_http_probe
  changed_when: false
  failed_when: false

- name: Install missing http MCP servers (user scope)
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command:
    argv:
      - claude
      - mcp
      - add
      - -s
      - user
      - --transport
      - http
      - "{{ item.item.name }}"
      - "{{ item.item.url }}"
  loop: "{{ _mcp_http_probe.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.rc != 0
