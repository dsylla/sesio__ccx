---
- name: Verify zsh is installed and is target_user's login shell
  ansible.builtin.shell: |
    set -e
    test "$(getent passwd {{ target_user }} | cut -d: -f7)" = "{{ target_shell }}"
    zsh --version
  register: _v_zsh
  changed_when: false

- name: Verify docker runs and user is in docker group
  ansible.builtin.shell: |
    set -e
    docker --version
    id -nG {{ target_user }} | tr ' ' '\n' | grep -qx docker
  register: _v_docker
  changed_when: false

- name: Verify asdf + languages
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.shell: |
    set -e
    source "{{ target_home }}/.asdf/asdf.sh"
    asdf --version
    python --version
    node --version
    ruby --version
  args:
    executable: /bin/bash
  register: _v_asdf
  changed_when: false

- name: Verify claude code
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.shell: |
    source "{{ target_home }}/.asdf/asdf.sh"
    claude --version
  args:
    executable: /bin/bash
  register: _v_claude
  changed_when: false

- name: Verify codex cli
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.shell: |
    source "{{ target_home }}/.asdf/asdf.sh"
    codex --version
  args:
    executable: /bin/bash
  register: _v_codex
  changed_when: false

- name: Verify codex MCP list
  become_user: "{{ target_user }}"
  become: true
  environment:
    PATH: "{{ target_home }}/.asdf/shims:/usr/local/bin:/usr/bin:/bin"
  ansible.builtin.command: codex mcp list
  register: _v_codex_mcp
  changed_when: false

- name: Verify aws cli
  ansible.builtin.shell: aws --version
  register: _v_aws
  changed_when: false

- name: Verify rtk (optional — arm64-musl release not published yet)
  ansible.builtin.shell: |
    if [ -x "{{ rtk_install_dir }}/rtk" ]; then
      "{{ rtk_install_dir }}/rtk" --version 2>&1 || echo "(rtk installed but not runnable — libc mismatch?)"
    else
      echo "(rtk unavailable — hook gracefully no-ops)"
    fi
  register: _v_rtk
  changed_when: false

- name: Verify claude-config clone + symlinks
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.shell: |
    set -e
    test -d "{{ claude_config_clone_path }}/.git"
    test "$(readlink {{ target_home }}/.claude/CLAUDE.md)" = "{{ claude_config_clone_path }}/CLAUDE.md"
    test "$(readlink {{ target_home }}/.claude/skills)"   = "{{ claude_config_clone_path }}/skills"
    git -C "{{ claude_config_clone_path }}" rev-parse --short HEAD
  register: _v_claude_config
  changed_when: false

- name: Verify ccxctl motd runs without error
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.command: "{{ target_home }}/.local/bin/ccxctl motd"
  register: _v_motd
  changed_when: false
  # Non-fatal: motd depends on ccx-cli uv sync which happens on first login.
  # Exit code only — piping `head -c N` would truncate the boxed UTF-8 output
  # mid-byte and break ansible's strict UTF-8 deserialization.
  failed_when: false

- name: Verify agent-monitor service is active
  ansible.builtin.command: systemctl is-active agent-monitor # noqa: command-instead-of-module
  register: _v_agent_monitor
  changed_when: false

- name: Verify /api/health responds (retry — listener may take a few seconds after systemd state=started)
  ansible.builtin.uri:
    url: "http://127.0.0.1:4820/api/health"
    return_content: true
  register: _v_agent_monitor_health
  retries: 10
  delay: 2
  until: _v_agent_monitor_health.status == 200
  changed_when: false

- name: Verify Node version is >= 22 (better-sqlite3 → node:sqlite fallback floor)
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.shell: |
    source "{{ target_home }}/.asdf/asdf.sh"
    node -e 'process.exit(parseInt(process.versions.node.split(".")[0],10) >= 22 ? 0 : 1)'
  args:
    executable: /bin/bash
  register: _v_node_22
  changed_when: false

- name: Verify Claude Code hooks reference hook-handler.js
  become_user: "{{ target_user }}"
  become: true
  ansible.builtin.shell: |
    grep -q hook-handler.js {{ target_home }}/.claude/settings.json
  args:
    executable: /bin/bash
  changed_when: false

- name: Write provision-ok marker
  ansible.builtin.copy:
    dest: /var/log/ccx-provision-ok
    content: |
      zsh:           {{ _v_zsh.stdout | trim }}
      docker:        {{ _v_docker.stdout | trim }}
      asdf:
      {{ _v_asdf.stdout | indent(8, true) }}
      claude:        {{ _v_claude.stdout | trim }}
      codex:         {{ _v_codex.stdout | trim }}
      codex-mcp:     {{ (_v_codex_mcp.rc == 0) | ternary('ok', 'failed') }}
      aws:           {{ _v_aws.stdout | trim }}
      rtk:           {{ _v_rtk.stdout | trim }}
      claude-config: {{ _v_claude_config.stdout | trim }}
      motd:          {{ ((_v_motd.rc | default(-1)) == 0) | ternary('ok', '(failed rc=' ~ (_v_motd.rc | default(-1) | string) ~ ')') }}
      agent-monitor: {{ _v_agent_monitor.stdout | trim }}
      agent-health:  {{ ((_v_agent_monitor_health.json.status | default('')) == 'ok') | ternary('ok', 'failed') }}
      agent-hooks:   ok
      time:          {{ ansible_date_time.iso8601 }}
    owner: root
    group: root
    mode: "0644"
