---
- name: Detect installed rtk (if any)
  ansible.builtin.command: "{{ rtk_install_dir }}/rtk --version"
  register: _rtk_version
  failed_when: false
  changed_when: false

- name: Download rtk release tarball (arm64)
  ansible.builtin.get_url:
    url: "{{ rtk_release_url }}"
    dest: /tmp/rtk-aarch64.tar.gz
    mode: "0644"
  when: _rtk_version.rc != 0

- name: Extract rtk
  ansible.builtin.unarchive:
    src: /tmp/rtk-aarch64.tar.gz
    dest: /tmp
    remote_src: yes
    creates: /tmp/rtk
  when: _rtk_version.rc != 0

- name: Install rtk to {{ rtk_install_dir }}
  ansible.builtin.copy:
    src: /tmp/rtk
    dest: "{{ rtk_install_dir }}/rtk"
    mode: "0755"
    owner: root
    group: root
    remote_src: yes
  when: _rtk_version.rc != 0

- name: Clean up rtk extraction artifacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/rtk-aarch64.tar.gz
    - /tmp/rtk
  when: _rtk_version.rc != 0

# rtk release is linux-gnu only (GLIBC-linked). Debian 12's GLIBC (2.36) is
# older than what the release binary requires (>= 2.39). If exec fails, remove
# the binary so rtk-rewrite.sh's `command -v rtk` check fails cleanly and the
# hook becomes a no-op (instead of Claude Code seeing broken rtk output).
- name: Test rtk runs (GLIBC compatibility etc.)
  ansible.builtin.command: "{{ rtk_install_dir }}/rtk --version"
  register: _rtk_test
  failed_when: false
  changed_when: false
  when: _rtk_version.rc != 0

- name: Remove broken rtk binary (incompatible libc, etc.)
  ansible.builtin.file:
    path: "{{ rtk_install_dir }}/rtk"
    state: absent
  when: _rtk_version.rc != 0 and _rtk_test.rc is defined and _rtk_test.rc != 0
