---
- name: Set the system hostname to the public FQDN
  # Without this, the kernel hostname is the EC2-assigned
  # `ip-172-31-…-…` cloud-init picks from DHCP; it also shows up in the
  # shell prompt and in `ccxctl motd`.
  ansible.builtin.hostname:
    name: "{{ ccx_hostname | default('ccx.dsylla.sesio.io') }}"

- name: Ensure /etc/hosts has an entry for the new hostname
  # `hostname(1)` alone doesn't touch /etc/hosts; without this, sudo and
  # anything resolving the hostname locally stalls on a DNS detour.
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1 {{ ccx_hostname | default('ccx.dsylla.sesio.io') }} {{ (ccx_hostname | default('ccx.dsylla.sesio.io')).split('.') | first }}"
    state: present

# Sentinel that .zshrc keys off to skip shell-aws-autoprofile, so AWS calls
# fall through to the EC2 instance role rather than chasing a named profile
# that doesn't exist in ~/.aws/config (botocore raises ProfileNotFound).
- name: Drop /etc/ccx-is-ec2 sentinel for dotfiles to detect this host
  ansible.builtin.copy:
    dest: /etc/ccx-is-ec2
    content: ""
    mode: "0644"
    owner: root
    group: root

- name: Tell cloud-init to stop resetting the hostname from DHCP
  # Debian 13's cloud-init rewrites /etc/hostname every boot from the
  # EC2 metadata. `preserve_hostname: true` pins whatever we set above.
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99-preserve-hostname.cfg
    mode: "0644"
    content: |
      # Managed by ccx ansible — keep the hostname we set (FQDN) rather
      # than letting cloud-init replace it with `ip-172-31-…` from DHCP.
      preserve_hostname: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
      - direnv
      - git
      - jq
      - tmux
      - unzip
      - fail2ban
      - unattended-upgrades
      - ca-certificates
      - gnupg
      - lsb-release
      - ncurses-bin   # provides `tic` for the alacritty terminfo install
      - python3
      - python3-pip
      - tree
      # CLI tools referenced unconditionally by dotfiles/.zshrc:
      #   - eza:    `ls`/`la`/`ll`/`lt` aliased to it (lines 156-162)
      #   - most:   `export PAGER='most'` (line 114)
      #   - ripgrep: `alias rg='rg --sort path'` (line 363)
      #   - bat:    used by log-reading aliases (lines 395-398)
      - eza
      - most
      - ripgrep
      - bat
    state: present

# Debian ships bat as `/usr/bin/batcat` (binary name collision with the
# `bacula-console-qt` package). The .zshrc aliases call `bat`; symlink so
# both names work without each user creating their own ~/.local/bin alias.
- name: Symlink batcat -> bat for Debian's renamed bat binary
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
    force: yes

- name: Configure unattended-upgrades (security only)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Origins-Pattern {
        "origin=Debian,codename=${distro_codename},label=Debian-Security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
    owner: root
    group: root
    mode: "0644"

- name: Enable periodic unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

# Debian 12 ships without rsyslog by default — no /var/log/auth.log. fail2ban's
# default sshd jail is file-backed and crashes on startup ("Have not found any
# log file for sshd jail"). Override to the systemd backend (reads journald).
- name: Configure fail2ban to use the systemd backend (Debian 12 has no auth.log)
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      backend = systemd

      [sshd]
      enabled = true
      maxretry = 5
      findtime = 10m
      bantime = 1h
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Ensure fail2ban is enabled and running
  ansible.builtin.systemd:
    name: fail2ban
    enabled: yes
    state: started

# Install uv system-wide so the ccx-cli venv + ansible shims can find it
# without relying on any per-user install. UV_INSTALL_DIR pins the target;
# the second task's `creates:` makes the whole sequence idempotent.
- name: Download uv installer
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: "0755"
  changed_when: false

- name: Install uv system-wide at /usr/local/bin/uv
  ansible.builtin.command: /bin/sh /tmp/uv-install.sh
  environment:
    UV_INSTALL_DIR: /usr/local/bin
  args:
    creates: /usr/local/bin/uv
