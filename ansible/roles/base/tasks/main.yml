---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
      - direnv
      - git
      - jq
      - tmux
      - unzip
      - fail2ban
      - unattended-upgrades
      - ca-certificates
      - gnupg
      - lsb-release
      - ncurses-bin   # provides `tic` for the alacritty terminfo install
      - python3
      - python3-pip
    state: present

- name: Configure unattended-upgrades (security only)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Origins-Pattern {
        "origin=Debian,codename=${distro_codename},label=Debian-Security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
    owner: root
    group: root
    mode: "0644"

- name: Enable periodic unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Ensure fail2ban is enabled and running
  ansible.builtin.systemd:
    name: fail2ban
    enabled: yes
    state: started

# Install uv system-wide so the ccx-cli venv + ansible shims can find it
# without relying on any per-user install. The official installer is a
# one-shot curl|sh; UV_INSTALL_DIR pins the target.
- name: Install uv system-wide at /usr/local/bin/uv
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/usr/local/bin sh
  args:
    creates: /usr/local/bin/uv
